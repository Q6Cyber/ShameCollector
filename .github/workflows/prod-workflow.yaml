name: ProdBuild&Deploy
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Select the branch to deploy
        required: true
        default: master
        type: string
env:
  PROJECT_ID: "stable-glass-183220"
  IMAGE_NAME: 'shame-collector'
  ENV_NAME: 'prod'
jobs:
  buildAndUploadProdArtifact:
    runs-on:
      group: stable-glass-183220
      labels:
        - stable-glass-183220
        - standard-4
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: install yarn
        run: npm install yarn -g
      - name: Get code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.PROD_GOOGLE_APPLICATION_CREDENTIALS }}'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Use gcloud CLI'
        run: 'gcloud info'
      - name: "Cache local node_modules"
        uses: actions/cache@v4
        with:
          path: ./node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: configure .npmrc
        run: |
            echo "//registry.npmjs.org/:_authToken=${{ secrets.Q6_NPMRC }}" > .npmrc
      - name: 'install'
        run: yarn install
      - name: "build"
        run: yarn run build
      - name: install-sev
        run: yarn install
      - name: clean-cache
        run: yarn cache clean
      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          registry: https://us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.PROD_GOOGLE_APPLICATION_CREDENTIALS }}
      - name: 'docker-build-push'
        run: |
          docker build -t us-docker.pkg.dev/$PROJECT_ID/us.gcr.io/$IMAGE_NAME:${{ github.sha }} -t us-docker.pkg.dev/$PROJECT_ID/us.gcr.io/$IMAGE_NAME:latest -f Dockerfile .
          docker push us-docker.pkg.dev/$PROJECT_ID/us.gcr.io/$IMAGE_NAME:${{ github.sha }}
          docker push us-docker.pkg.dev/$PROJECT_ID/us.gcr.io/$IMAGE_NAME:latest

  triggerProdHelmFlow:
    needs:
      - buildAndUploadProdArtifact
    runs-on:
      group: stable-glass-183220
      labels:
        - stable-glass-183220
        - standard-4
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Get code
        uses: actions/checkout@v6
      - name: Trigger Helm Chart flow
        uses: q6Cyber/helm-chart-trigger-flow@v3
        with:
          git-token: ${{ secrets.GIT_TOKEN }}
          env: 'prod'
          application: 'shame-collector'
          tag: ${{ github.sha }}
          image: 'shame-collector'
          image-key: 'deployment.image'
